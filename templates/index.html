<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI-Ideen-Validator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        textarea {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            height: 120px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .analyse {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            margin-top: 30px;
            white-space: pre-wrap;
            line-height: 1.6;
            border: 2px solid #007bff;
        }
    </style>
</head>
<body>
    <h1>🚀 KI-Ideen-Validator</h1>
    <p style="text-align:center">Gib deine Geschäftsidee ein und lass die KI sie analysieren!</p>

    <form method="POST">
        <textarea name="idee" placeholder="Beschreibe deine Geschäftsidee hier..."></textarea>
        <button type="submit">💡 Idee analysieren</button>
    </form>

    {% if analyse %}
    <div class="analyse">{{ analyse }}</div>
    {% endif %}
</body>
</html>
