<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI-Ideen-Validator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbfbfd;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        nav span {
            font-size: 17px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.3px;
        }

        .container {
            width: 100%;
            max-width: 680px;
            padding: 40px 20px;
            margin-top: 60px;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .badge {
            display: inline-block;
            background: #f5f5f7;
            color: #6e6e73;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 16px;
            color: #1d1d1f;
        }

        h1 span {
            background: linear-gradient(90deg, #0071e3, #40a9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 18px;
            color: #6e6e73;
            font-weight: 400;
            line-height: 1.6;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #6e6e73;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            background: #f5f5f7;
            border: 1px solid transparent;
            border-radius: 12px;
            color: #1d1d1f;
            height: 130px;
            resize: none;
            outline: none;
            transition: all 0.2s;
            line-height: 1.6;
        }

        textarea::placeholder {
            color: #aeaeb2;
        }

        textarea:focus {
            background: white;
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 14px;
            transition: all 0.2s;
            letter-spacing: -0.2px;
        }

        button:hover {
            background: #0077ed;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .analyse {
            margin-top: 24px;
            background: #f5f5f7;
            border-radius: 16px;
            padding: 28px;
            color: #1d1d1f;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 15px;
            animation: fadeIn 0.4s ease;
        }

        .analyse-header {
            font-weight: 600;
            font-size: 15px;
            color: #0071e3;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #aeaeb2;
            font-size: 13px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <nav>
        <span>💡 Ideen Validator</span>
    </nav>

    <div class="container">
        <div class="hero">
            <div class="badge">KI-gestützt</div>
            <h1>Deine Idee.<br><span>Analysiert.</span></h1>
            <p class="subtitle">Erhalte sofortiges Feedback von einer KI<br>mit Unternehmer-Erfahrung.</p>
        </div>

        <div class="card">
            <form method="POST">
                <label>Deine Geschäftsidee</label>
                <textarea name="idee" placeholder="Beschreibe deine Geschäftsidee..."></textarea>
                <button type="submit">Idee analysieren →</button>
            </form>

            {% if analyse %}
            <div class="analyse">
                <div class="analyse-header">📊 Deine KI-Analyse</div>
                {{ analyse }}
            </div>
            {% endif %}
        </div>

        <div class="footer">
            Powered by Claude AI · Anthropic
        </div>
    </div>
</body>
</html>
